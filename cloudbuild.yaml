steps:
  # 0. Fetch the secret and save it as a JSON file
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret="FIREBASE_SERVICE_ACCOUNT" > ./be/service-account.json

  # 1. Build Backend (NestJS) Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-central2-docker.pkg.dev/angular-top/repo/backend:latest', './be']

  # 2. Push Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-central2-docker.pkg.dev/angular-top/repo/backend:latest']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backend-service'
      - '--image'
      - 'europe-central2-docker.pkg.dev/angular-top/repo/backend:latest'
      - '--region'
      - 'europe-central2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 4. Build Frontend (Angular)
  - name: 'node:20'
    entrypoint: npm
    args: [ 'install', '--legacy-peer-deps' ]
    env:
      - 'npm_config_platform=linux'
      - 'npm_config_arch=x64'
    dir: 'fe'
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'fe'

  # 5. Deploy to Firebase Hosting
  - name: 'node:20'
    entrypoint: npx
    args: ['firebase-tools', 'deploy', '--only', 'hosting', '--token', '${_FIREBASE_TOKEN}']

options:
  logging: CLOUD_LOGGING_ONLY
