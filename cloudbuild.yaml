steps:
  # 0. Fetch the secret and save it as a temporary file in the build workspace
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # We use the environment variable defined below to create the file
        echo "$$FIREBASE_JSON" > ./be/service-account.json
    secretEnv: [ 'FIREBASE_JSON' ]
  # 1. Build Backend (NestJS) Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-central2-docker.pkg.dev/angular-top/repo/backend:latest', './be']

  # 2. Push Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-central2-docker.pkg.dev/angular-top/repo/backend:latest']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backend-service'
      - '--image'
      - 'europe-central2-docker.pkg.dev/angular-top/repo/backend:latest'
      - '--region'
      - 'europe-central2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 4. Build Frontend (Angular)
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
    dir: 'fe'
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'fe'

  # 5. Deploy to Firebase Hosting (Reliable Method)
  - name: 'node:20'
    entrypoint: npx
    args: ['firebase-tools', 'deploy', '--only', 'hosting', '--project', 'angular-top']

options:
  logging: CLOUD_LOGGING_ONLY

# This ensures the secret is available to the steps above
availableSecrets:
  secretManager:
    - versionName: projects/angular-top/secrets/FIREBASE_SERVICE_ACCOUNT/versions/latest
      env: 'FIREBASE_JSON'