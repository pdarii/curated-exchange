<!-- Top navigation bar -->
<header class="shell-header">
  <div class="shell-header__inner">
    <!-- Logo -->
    <a routerLink="/dashboard" class="shell-logo">
      <span class="shell-logo__text">THE CURATED EXCHANGE</span>
    </a>

    <!-- Nav links -->
    <nav class="shell-nav">
      @for (link of navLinks; track link.route) {
        <a
          [routerLink]="link.route"
          routerLinkActive="shell-nav__link--active"
          class="shell-nav__link"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <span class="flex-1"></span>

    <!-- Right actions -->
    <div class="shell-actions">
      <div class="notif-anchor">
        <button mat-icon-button (click)="toggleFeed()" [matBadge]="unreadCount()" matBadgeColor="warn" [matBadgeHidden]="unreadCount() === 0" matBadgeSize="small">
          <mat-icon>{{ feedOpen() ? 'notifications' : 'notifications_none' }}</mat-icon>
        </button>

        <!-- Notification popup -->
        @if (feedOpen()) {
          <div class="feed-popup">
            <div class="feed-popup__header">
              <h3 class="feed-popup__title">Activity Feed</h3>
              <button mat-icon-button (click)="closeFeed()" class="feed-popup__close">
                <mat-icon>close</mat-icon>
              </button>
            </div>
            <div class="feed-popup__list">
              @for (n of notifications(); track n.id) {
                <div class="feed-item" [class.feed-item--unread]="!n.read">
                  <div class="feed-item__icon" [style.background-color]="notifColor(n.type)">
                    <mat-icon class="feed-item__mat-icon">{{ notifIcon(n.type) }}</mat-icon>
                  </div>
                  <div class="feed-item__body">
                    <p class="feed-item__text" [innerHTML]="n.message"></p>
                    <span class="feed-item__time">{{ timeAgo(n.createdAt) }}</span>
                  </div>
                </div>
              } @empty {
                <div class="feed-popup__empty">
                  <mat-icon>notifications_off</mat-icon>
                  <p>No notifications yet</p>
                </div>
              }
            </div>
          </div>
        }
      </div>

      <div class="shell-avatar"></div>
      <button mat-icon-button (click)="logout()">
        <mat-icon>account_balance_wallet</mat-icon>
      </button>
    </div>
  </div>
</header>

<!-- Backdrop to close popup -->
@if (feedOpen()) {
  <div class="feed-backdrop" (click)="closeFeed()"></div>
}

<!-- Page content -->
<main class="shell-main">
  <router-outlet />
</main>
