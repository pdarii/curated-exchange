<h2 mat-dialog-title class="dialog-title">List Pet for Sale</h2>

<mat-dialog-content class="dialog-content">
  <!-- Select Pet -->
  <label class="field-label">Select Pet</label>
  <mat-form-field appearance="outline" class="dialog-field">
    <mat-select
      [(ngModel)]="selectedPetId"
      (ngModelChange)="onPetChange()"
      [disabled]="petLocked"
    >
      @for (pet of pets; track pet.id) {
        <mat-option [value]="pet.id">{{ petLabel(pet) }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <!-- Intrinsic Value display -->
  @if (selectedPet; as pet) {
    <div class="intrinsic-display">
      <span class="intrinsic-display__label">Intrinsic Value</span>
      <div class="intrinsic-display__row">
        <span class="intrinsic-display__value">{{ pet.intrinsicValue | currency: 'USD' : 'symbol' : '1.2-2' }}</span>
        <mat-icon class="intrinsic-display__icon">info</mat-icon>
      </div>
    </div>
  }

  <!-- Asking Price -->
  <label class="field-label">Asking Price ($)</label>
  <mat-form-field appearance="outline" class="dialog-field">
    <input
      matInput
      type="number"
      [(ngModel)]="askingPrice"
      min="0.01"
      step="0.01"
    />
    <mat-icon matSuffix class="field-suffix-icon">attach_money</mat-icon>
  </mat-form-field>

  <p class="dialog-hint">Suggested listing price based on current liquidity and rarity metrics.</p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="cancel()" class="dialog-cancel">Cancel</button>
  <button
    mat-flat-button
    (click)="confirm()"
    [disabled]="!selectedPetId || askingPrice <= 0"
    class="dialog-confirm"
  >
    Confirm Listing
  </button>
</mat-dialog-actions>
